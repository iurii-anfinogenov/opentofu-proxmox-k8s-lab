#cloud-config
timezone: Europe/Moscow

users:
  - name: user
    groups: [wheel]
    shell: /bin/bash
    lock_passwd: false
    passwd: "$6$bqp3nBwI4R3D30rg$Gyx0u62YOyV2fYQsAzfD5n8Uk1MjABmsXslS8.gq6Q2/ge82Dpm.icNX6cVTiA53GJ6fw57rwMKuKGGfytWVb/"
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${ssh_key}


packages:
  - qemu-guest-agent

write_files:
  - path: /etc/hosts
    content: |
      127.0.0.1 localhost
      ${ipv4} ${hostname}

      # The following lines are desirable for IPv6 capable hosts
      ::1 ip6-localhost ip6-loopback
      fe00::0 ip6-localnet
      ff00::0 ip6-mcastprefix
      ff02::1 ip6-allnodes
      ff02::2 ip6-allrouters
      ff02::3 ip6-allhosts  

runcmd:
  - systemctl enable --now qemu-guest-agent
  - hostnamectl set-hostname ${hostname}